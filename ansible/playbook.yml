- name: Execute script from Jenkins workspace
  hosts: all
  become: yes

  tasks:
    - name: Copy script
      copy:
        src: "{{ workspace }}/scripts/{{ script_name }}"
        dest: "/tmp/{{ script_name }}"
        mode: "0755"

    - name: Run script
      shell: "/tmp/{{ script_name }} {{ message }}"
      register: output

    - name: Print output
      debug:
        var: output.stdout
